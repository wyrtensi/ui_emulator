<div class="inv-container" data-export="inv-full">
  <div class="inv-header" data-export="inv-header">
    <span class="inv-title" data-export="inv-title">INVENTORY</span>
    <button class="inv-close" data-export="inv-close" title="Close">✕</button>
  </div>

  <div class="inv-toolbar" data-export="inv-toolbar">
    <div class="inv-tabs" data-export="inv-tabs">
      <button class="inv-tab active" data-tab="ALL" data-export="inv-tab">ALL</button>
      <button class="inv-tab" data-tab="EQUIP" data-export="inv-tab">EQUIP</button>
      <button class="inv-tab" data-tab="USE" data-export="inv-tab">USE</button>
      <button class="inv-tab" data-tab="ETC" data-export="inv-tab">ETC</button>
    </div>
    <input class="inv-search" data-export="inv-search" type="text" placeholder="Search..." />
  </div>

  <div class="inv-grid" data-export="inv-grid"></div>

  <div class="inv-footer" data-export="inv-footer">
    <span class="inv-count" data-export="inv-count">7/200 SLOTS</span>
    <span class="inv-gold" data-export="inv-gold">💰 4,250,000</span>
  </div>
</div>

<div class="ps-container" data-export="ps-full">
  <div class="ps-header">
    <span class="ps-title">STATUS</span>
    <button class="ps-close" title="Close">✕</button>
  </div>

  <div class="ps-body">
    <!-- Top row: race icon + guild/timer -->
    <div class="ps-top-row">
      <div class="ps-race-wrap" data-export="ps-icon">
        <div class="ps-race-inner">
          <svg viewBox="0 0 24 24"><path d="M12 1L3 5v6c0 5.55 3.84 10.74 9 12 5.16-1.26 9-6.45 9-12V5l-9-4z"/></svg>
        </div>
      </div>
      <div class="ps-guild-group">
        <span class="ps-guild-name">CORA ALLIANCE</span>
        <span class="ps-timer">59:00</span>
      </div>
    </div>

    <!-- Data bars -->
    <div class="ps-bars" data-export="ps-bars">
      <div class="ps-bar ps-hp" style="width:100%">
        <div class="ps-bar-info">
          <span class="ps-bar-label">HP</span>
          <span class="ps-bar-val">14,875 / 15,200</span>
        </div>
        <div class="ps-bar-track"><div class="ps-bar-fill" style="width:97.8%"></div></div>
      </div>
      <div class="ps-bar ps-fp" style="width:85%">
        <div class="ps-bar-info">
          <span class="ps-bar-label">FP</span>
          <span class="ps-bar-val">9,950 / 10,100</span>
        </div>
        <div class="ps-bar-track"><div class="ps-bar-fill" style="width:98.5%"></div></div>
      </div>
      <div class="ps-bar ps-sp" style="width:66%">
        <div class="ps-bar-info">
          <span class="ps-bar-label">SP</span>
          <span class="ps-bar-val">1,600 / 1,800</span>
        </div>
        <div class="ps-bar-track"><div class="ps-bar-fill" style="width:88.9%"></div></div>
      </div>
      <div class="ps-bar ps-def" style="width:53%">
        <div class="ps-bar-info">
          <span class="ps-bar-label">DEF</span>
          <span class="ps-bar-val">810 / 850</span>
        </div>
        <div class="ps-bar-track"><div class="ps-bar-fill" style="width:95.3%"></div></div>
      </div>
    </div>
  </div>
</div>

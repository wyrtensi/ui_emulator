<div class="cb-container" data-export="cb-full">
  <div class="cb-tabs" data-export="cb-tabs">
    <div class="cb-tabs-inner" data-export="cb-tabs-inner">
      <span class="cb-tab active">ALL</span>
      <span class="cb-tab">GUILD</span>
      <span class="cb-tab">PARTY</span>
      <span class="cb-tab">RACE</span>
    </div>
    <span class="cb-close" data-export="cb-close" title="Close">✖</span>
  </div>

  <div class="cb-log" data-export="cb-log">
    <div class="cb-msg cb-sys" data-export="cb-msg"><span class="cb-time">[14:02]</span><span class="cb-txt">Welcome to the Novus Sector.</span></div>
    <div class="cb-msg cb-all" data-export="cb-msg"><span class="cb-time">[14:05]</span><span class="cb-txt"><span>[All]</span> <b>Warrior12</b>: Party for HQ farm?</span></div>
    <div class="cb-msg cb-guild" data-export="cb-msg"><span class="cb-time">[14:06]</span><span class="cb-txt"><span>[Guild]</span> <b>Officer</b>: Gather up at the base.</span></div>
    <div class="cb-msg cb-party" data-export="cb-msg"><span class="cb-time">[14:08]</span><span class="cb-txt"><span>[Party]</span> <b>Clericz</b>: Buffing, wait a sec.</span></div>
    <div class="cb-msg cb-race" data-export="cb-msg"><span class="cb-time">[14:10]</span><span class="cb-txt"><span>[Race]</span> <b>Archon</b>: Chip is under attack! Defend!</span></div>
  </div>

  <div class="cb-input-box" data-export="cb-input">
    <span class="cb-type" data-export="cb-type">ALL</span>
    <input type="text" class="cb-input" data-export="cb-field" placeholder="TRANSMIT...">
  </div>
</div>

<div class="cb-container" data-export="cb-full">
  <div class="cb-tabs" data-export="cb-tabs">
    <div class="cb-tabs-inner" data-export="cb-tabs-inner">
      <span class="cb-tab active" data-export="cb-tab" data-channel="ALL">ALL</span>
      <span class="cb-tab" data-export="cb-tab" data-channel="GUILD">GUILD</span>
      <span class="cb-tab" data-export="cb-tab" data-channel="PARTY">PARTY</span>
      <span class="cb-tab" data-export="cb-tab" data-channel="RACE">RACE</span>
    </div>
    <span class="cb-close" data-export="cb-close" title="Close">✖</span>
  </div>

  <div class="cb-log" data-export="cb-log">
    <div class="cb-msg cb-sys" data-export="cb-msg" data-channel="ALL"><span class="cb-time" data-export="cb-time">[14:02]</span><span class="cb-txt" data-export="cb-text">Welcome to the Novus Sector.</span></div>
    <div class="cb-msg cb-all" data-export="cb-msg" data-channel="ALL"><span class="cb-time" data-export="cb-time">[14:05]</span><span class="cb-txt" data-export="cb-text"><span>[All]</span> <b>Warrior12</b>: Party for HQ farm?</span></div>
    <div class="cb-msg cb-guild" data-export="cb-msg" data-channel="GUILD"><span class="cb-time" data-export="cb-time">[14:06]</span><span class="cb-txt" data-export="cb-text"><span>[Guild]</span> <b>Officer</b>: Gather up at the base.</span></div>
    <div class="cb-msg cb-party" data-export="cb-msg" data-channel="PARTY"><span class="cb-time" data-export="cb-time">[14:08]</span><span class="cb-txt" data-export="cb-text"><span>[Party]</span> <b>Clericz</b>: Buffing, wait a sec.</span></div>
    <div class="cb-msg cb-race" data-export="cb-msg" data-channel="RACE"><span class="cb-time" data-export="cb-time">[14:10]</span><span class="cb-txt" data-export="cb-text"><span>[Race]</span> <b>Archon</b>: Chip is under attack! Defend!</span></div>
  </div>

  <div class="cb-input-box" data-export="cb-input">
    <span class="cb-type" data-export="cb-type">ALL</span>
    <input type="text" class="cb-input" data-export="cb-field" placeholder="TRANSMIT...">
  </div>
</div>

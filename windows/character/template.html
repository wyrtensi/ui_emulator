<div data-export="char-full" style="padding: 10px; margin: -10px;">
<div class="char-container">
  <div data-export="char-header" style="padding: 10px; margin: -10px;">
    <div class="char-header">
      <div data-export="char-title" style="padding: 10px; margin: -10px; display: flex;"><span class="char-title">CHARACTER</span></div>
      <div data-export="char-tabs" style="padding: 10px; margin: -10px; display: flex;">
        <div class="char-tab-row">
          <button class="char-tab active">EQUIP</button>
          <button class="char-tab">COSTUMES</button>
        </div>
      </div>
      <div data-export="char-close" style="padding: 10px; margin: -10px; display: flex;"><button class="char-close" title="Close">✕</button></div>
    </div>
  </div>

  <div class="char-body">
    <!-- Equipment area with silhouette -->
    <div data-export="char-equip" style="padding: 10px; margin: -10px; position: relative;">
      <div class="char-equip-area">
        <div data-export="char-silhouette" style="padding: 10px; margin: -10px; position: absolute; inset: 0;">
          <div class="char-silhouette">
            <svg viewBox="0 0 120 200" fill="none" stroke="rgba(0,229,255,0.08)" stroke-width="0.8">
              <ellipse cx="60" cy="28" rx="16" ry="18"/>
              <line x1="60" y1="46" x2="60" y2="120"/>
              <line x1="60" y1="60" x2="30" y2="95"/>
              <line x1="60" y1="60" x2="90" y2="95"/>
              <line x1="60" y1="120" x2="38" y2="185"/>
              <line x1="60" y1="120" x2="82" y2="185"/>
            </svg>
          </div>
        </div>

      <!-- Left slots -->
      <div class="eq-slot eq-head" title="Head"><span>HEAD</span></div>
      <div class="eq-slot eq-chest" title="Chest"><span>CHEST</span></div>
      <div class="eq-slot eq-legs" title="Legs"><span>LEGS</span></div>
      <div class="eq-slot eq-shoes" title="Shoes"><span>SHOES</span></div>
      <div class="eq-slot eq-cloak" title="Cloak"><span>CLOAK</span></div>
      <div class="eq-slot eq-glove" title="Gloves"><span>GLOVE</span></div>

      <!-- Right slots -->
      <div class="eq-slot eq-weapon" title="Weapon"><span>WEAPON</span></div>
      <div class="eq-slot eq-shield" title="Shield"><span>SHIELD</span></div>
      <div class="eq-slot eq-ring1" title="Ring 1"><span>RING</span></div>
      <div class="eq-slot eq-ring2" title="Ring 2"><span>RING</span></div>
      <div class="eq-slot eq-amu1" title="Amulet 1"><span>AMU</span></div>
      <div class="eq-slot eq-amu2" title="Amulet 2"><span>AMU</span></div>
      </div>
    </div>

    <!-- Stats grid -->
    <div data-export="char-stats" style="padding: 10px; margin: -10px;">
      <div class="char-stats">
        <div data-export="char-stat-atk" style="padding: 10px; margin: -10px; display: flex; flex-direction: column;">
          <div class="stat-box">
            <span class="stat-label">ATTACK</span><span class="stat-val">2,450</span>
          </div>
        </div>
        <div data-export="char-stat-def" style="padding: 10px; margin: -10px; display: flex; flex-direction: column;">
          <div class="stat-box">
            <span class="stat-label">DEFENSE</span><span class="stat-val">1,820</span>
          </div>
        </div>
        <div data-export="char-stat-range" style="padding: 10px; margin: -10px; display: flex; flex-direction: column;">
          <div class="stat-box">
            <span class="stat-label">RANGE</span><span class="stat-val">180</span>
          </div>
        </div>
        <div data-export="char-stat-hp" style="padding: 10px; margin: -10px; display: flex; flex-direction: column;">
          <div class="stat-box">
            <span class="stat-label">MAX HP</span><span class="stat-val">15,200</span>
          </div>
        </div>
      </div>
    </div>

    <!-- Mastery bars -->
    <div data-export="char-mastery" style="padding: 10px; margin: -10px;">
      <div class="char-mastery">
        <div data-export="char-mastery-melee" style="padding: 10px; margin: -10px;">
          <div class="mastery-row">
            <span class="mastery-label">MELEE</span>
            <div class="mastery-track"><div class="mastery-fill" style="width:92%"></div></div>
            <span class="mastery-rank">GM</span>
          </div>
        </div>
        <div data-export="char-mastery-range" style="padding: 10px; margin: -10px;">
          <div class="mastery-row">
            <span class="mastery-label">RANGE</span>
            <div class="mastery-track"><div class="mastery-fill" style="width:78%"></div></div>
            <span class="mastery-rank">GM</span>
          </div>
        </div>
        <div data-export="char-mastery-def" style="padding: 10px; margin: -10px;">
          <div class="mastery-row">
            <span class="mastery-label">DEFENSE</span>
            <div class="mastery-track"><div class="mastery-fill" style="width:85%"></div></div>
            <span class="mastery-rank">GM</span>
          </div>
        </div>
        <div data-export="char-mastery-shield" style="padding: 10px; margin: -10px;">
          <div class="mastery-row">
            <span class="mastery-label">SHIELD</span>
            <div class="mastery-track"><div class="mastery-fill" style="width:60%"></div></div>
            <span class="mastery-rank">PT</span>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
</div>

<div class="class-container" data-export="class-full">
  <div class="class-header" data-export="class-header">
    <span class="class-title" data-export="class-title">CLASS SELECTION</span>
    <button class="class-close" data-export="class-close" title="Close">✕</button>
  </div>

  <div class="class-body">
    <div class="class-cards-area">
      <!-- CRS1 Class Card -->
      <div class="class-card selected" data-export="class-card-crs1">
        <div class="class-card-image">
          <img src="assets/classes/classImage_CRS1.png" alt="CRS1 Class">
        </div>
        <div class="class-card-info">
          <div class="class-card-name">STRIKER</div>
          <div class="class-card-desc">Melee combat specialist with high attack and defense.</div>
        </div>
      </div>

      <!-- CWF2 Class Card -->
      <div class="class-card" data-export="class-card-cwf2">
        <div class="class-card-image">
          <img src="assets/classes/classImage_CWF2.png" alt="CWF2 Class">
        </div>
        <div class="class-card-info">
          <div class="class-card-name">RANGER</div>
          <div class="class-card-desc">Ranged combat specialist with high mobility.</div>
        </div>
      </div>
    </div>
  </div>

  <div class="class-footer">
    <button class="class-btn class-cancel-btn">CANCEL</button>
    <button class="class-btn class-ok-btn class-btn-primary">OK</button>
  </div>
</div>

<div class="example-v2-shell" data-export="example-v2-full">
  <div class="example-v2-header" data-export="example-v2-header">
    <div class="example-v2-title-wrap" data-export="example-v2-title-wrap">
      <span class="example-v2-kicker" data-export="example-v2-kicker">Example Window</span>
      <h4 class="example-v2-title" data-export="example-v2-title">Command Deck v2</h4>
    </div>
    <button class="example-v2-close" data-export="example-v2-close" title="Close">X</button>
  </div>

  <div class="example-v2-mode" data-export="example-v2-mode">
    <button class="example-v2-mode-btn active" data-mode="combat" data-export="example-v2-mode-btn">Combat</button>
    <button class="example-v2-mode-btn" data-mode="support" data-export="example-v2-mode-btn">Support</button>
    <button class="example-v2-mode-btn" data-mode="utility" data-export="example-v2-mode-btn">Utility</button>
  </div>

  <div class="example-v2-body" data-export="example-v2-grid">
    <section class="example-v2-panel active" data-mode="combat" data-export="example-v2-panel">
      <div class="example-v2-card" data-export="example-v2-card">
        <span data-export="example-v2-card-label">Attack Chain</span>
        <strong data-export="example-v2-card-value">7 hits</strong>
      </div>
      <div class="example-v2-card" data-export="example-v2-card">
        <span data-export="example-v2-card-label">Crit Rate</span>
        <strong data-export="example-v2-card-value">42%</strong>
      </div>
      <div class="example-v2-card" data-export="example-v2-card">
        <span data-export="example-v2-card-label">Burst Ready</span>
        <strong data-export="example-v2-card-value">YES</strong>
      </div>
    </section>

    <section class="example-v2-panel" data-mode="support" data-export="example-v2-panel">
      <div class="example-v2-card" data-export="example-v2-card">
        <span data-export="example-v2-card-label">Team Aura</span>
        <strong data-export="example-v2-card-value">+12%</strong>
      </div>
      <div class="example-v2-card" data-export="example-v2-card">
        <span data-export="example-v2-card-label">Shield Uptime</span>
        <strong data-export="example-v2-card-value">64%</strong>
      </div>
      <div class="example-v2-card" data-export="example-v2-card">
        <span data-export="example-v2-card-label">Revive Charge</span>
        <strong data-export="example-v2-card-value">1</strong>
      </div>
    </section>

    <section class="example-v2-panel" data-mode="utility" data-export="example-v2-panel">
      <div class="example-v2-card" data-export="example-v2-card">
        <span data-export="example-v2-card-label">Loot Slots</span>
        <strong data-export="example-v2-card-value">26/40</strong>
      </div>
      <div class="example-v2-card" data-export="example-v2-card">
        <span data-export="example-v2-card-label">Teleport Fuel</span>
        <strong data-export="example-v2-card-value">88%</strong>
      </div>
      <div class="example-v2-card" data-export="example-v2-card">
        <span data-export="example-v2-card-label">Scanner</span>
        <strong data-export="example-v2-card-value">ONLINE</strong>
      </div>
    </section>
  </div>
</div>

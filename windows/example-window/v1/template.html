<div class="example-container" data-export="example-full">

  <div class="example-header" data-export="example-header">
    <span class="example-title" data-export="example-title">EXAMPLE WINDOW V1</span>
    <button class="example-close" data-export="example-close" title="Close">X</button>
  </div>

  <div class="example-tabs" data-export="example-tabs">
    <button class="example-tab active" data-tab="info" data-export="example-tab">INFO</button>
    <button class="example-tab" data-tab="stats" data-export="example-tab">STATS</button>
    <button class="example-tab" data-tab="settings" data-export="example-tab">SETTINGS</button>
  </div>

  <div class="example-body" data-export="example-content">

    <div class="example-panel active" data-panel="info" data-export="example-panel">
      <div class="example-row" data-export="example-row">
        <span class="example-label" data-export="example-label">Name</span>
        <span class="example-value" data-export="example-value">Jerry_The_Hunter</span>
      </div>
      <div class="example-row" data-export="example-row">
        <span class="example-label" data-export="example-label">Race</span>
        <span class="example-value accent" data-export="example-value">CORA</span>
      </div>
      <div class="example-row" data-export="example-row">
        <span class="example-label" data-export="example-label">Level</span>
        <span class="example-value" data-export="example-value">50</span>
      </div>
      <div class="example-bar-group" data-export="example-bars">
        <div class="example-bar hp" data-export="example-bar">
          <div class="example-bar-fill" data-export="example-bar-fill" style="width: 97.8%"></div>
          <span class="example-bar-text" data-export="example-bar-text">HP 14,875 / 15,200</span>
        </div>
        <div class="example-bar fp" data-export="example-bar">
          <div class="example-bar-fill" data-export="example-bar-fill" style="width: 100%"></div>
          <span class="example-bar-text" data-export="example-bar-text">FP 1,200 / 1,200</span>
        </div>
        <div class="example-bar sp" data-export="example-bar">
          <div class="example-bar-fill" data-export="example-bar-fill" style="width: 55%"></div>
          <span class="example-bar-text" data-export="example-bar-text">SP 1,600 / 2,900</span>
        </div>
      </div>
    </div>

    <div class="example-panel" data-panel="stats" data-export="example-panel">
      <div class="example-stat-grid" data-export="example-stat-grid">
        <div class="example-stat" data-export="example-stat">
          <span class="stat-label" data-export="example-stat-label">ATTACK</span>
          <span class="stat-value" data-export="example-stat-value">1971</span>
        </div>
        <div class="example-stat" data-export="example-stat">
          <span class="stat-label" data-export="example-stat-label">DEFENSE</span>
          <span class="stat-value" data-export="example-stat-value">1529</span>
        </div>
        <div class="example-stat" data-export="example-stat">
          <span class="stat-label" data-export="example-stat-label">RANGE</span>
          <span class="stat-value" data-export="example-stat-value">55</span>
        </div>
        <div class="example-stat" data-export="example-stat">
          <span class="stat-label" data-export="example-stat-label">MAX HP</span>
          <span class="stat-value" data-export="example-stat-value">16443</span>
        </div>
      </div>
    </div>

    <div class="example-panel" data-panel="settings" data-export="example-panel">
      <p class="example-hint" data-export="example-hint">Classic variant with tab switching.</p>
      <p class="example-hint" data-export="example-hint">Version key: <code>v1</code>.</p>
    </div>

  </div>
</div>

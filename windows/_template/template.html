<!-- Template Window -->
<!-- Wrap the entire window in data-export="full" for full-window export -->
<div data-export="full" style="padding: 10px; margin: -10px;">
<div class="window-container">

  <!-- DRAG HANDLE: This element is referenced by config.dragHandle -->
  <div class="window-header">
    <span class="window-title">Template Window</span>
    <button class="window-close-btn" title="Close">✕</button>
  </div>

  <!-- CONTENT: Your window content goes here -->
  <div class="window-body" data-export="content">
    <p>This is a template window. Replace this content.</p>
  </div>

</div>
</div>

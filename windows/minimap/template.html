<div class="mm-container" data-export="mm-full">
  <div class="mm-header" data-export="mm-header">
    <span class="mm-location" data-export="mm-location">BELLATO HQ</span>
    <span class="mm-close" data-export="mm-close" title="Close">✖</span>
  </div>
  <div class="mm-content" data-export="mm-content">
    <div class="mm-body" data-export="mm-map">
      <div class="mm-grid" data-export="mm-grid"></div>
      <div class="mm-crosshair" data-export="mm-crosshair"></div>
      <div class="mm-player" data-export="mm-player"></div>
    </div>
    <div class="mm-tools" data-export="mm-tools">
      <button class="mm-btn" data-export="mm-tool-btn" data-tool="zoom-in">+</button>
      <button class="mm-btn" data-export="mm-tool-btn" data-tool="pin">⚲</button>
      <button class="mm-btn" data-export="mm-tool-btn" data-tool="zoom-out">-</button>
      <button class="mm-btn" data-export="mm-tool-btn" data-tool="center">◎</button>
    </div>
  </div>
  <div class="mm-footer" data-export="mm-coords">COORD X:23 Y:27</div>
</div>

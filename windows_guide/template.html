<div class="wg-shell" data-export="wg-full">
  <div class="wg-header">
    <span class="wg-title">MY WINDOW</span>
    <button class="wg-close" title="Close">X</button>
  </div>

  <div class="wg-tabs">
    <button class="wg-tab active" data-tab="info">INFO</button>
    <button class="wg-tab" data-tab="stats">STATS</button>
  </div>

  <div class="wg-body">
    <section class="wg-panel active" data-panel="info">
      <div class="wg-row">
        <span class="wg-label">Name</span>
        <span class="wg-value">Pilot_01</span>
      </div>
      <div class="wg-row">
        <span class="wg-label">Race</span>
        <span class="wg-value">BELLATO</span>
      </div>
      <div class="wg-row">
        <span class="wg-label">Level</span>
        <span class="wg-value">50</span>
      </div>
    </section>

    <section class="wg-panel" data-panel="stats">
      <div class="wg-row">
        <span class="wg-label">Attack</span>
        <span class="wg-value">2450</span>
      </div>
      <div class="wg-row">
        <span class="wg-label">Defense</span>
        <span class="wg-value">1820</span>
      </div>
      <div class="wg-meter">
        <div class="wg-meter-fill" style="width: 64%"></div>
      </div>
    </section>
  </div>
</div>

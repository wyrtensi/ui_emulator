<!DOCTYPE html>
<html>
<head>
<style>
  body { margin: 0; padding: 0; background: #333; overflow: hidden; }
  #ui-viewport {
    position: absolute;
    width: 1920px;
    height: 1080px;
    transform-origin: top left;
    background: #000;
  }
</style>
</head>
<body>
<div id="ui-viewport"></div>
<script>
  function applyScale(scale) {
    const viewport = document.getElementById('ui-viewport');
    viewport.style.transform = `scale(${scale})`;

    const vw = 1920 * scale;
    const vh = 1080 * scale;
    const ww = window.innerWidth;
    const wh = window.innerHeight;
    viewport.style.left = vw < ww ? ((ww - vw) / 2) + 'px' : '0';
    viewport.style.top = vh < wh ? ((wh - vh) / 2) + 'px' : '0';
  }
  applyScale(0.5);
</script>
</body>
</html>

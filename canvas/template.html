<div class="canvas-window" data-export="canvas-full">
  <div class="canvas-header"></div>

  <button class="canvas-tool-btn canvas-danger" id="canvas-close-top-right" title="Close Canvas" style="position: absolute; top: 16px; right: 16px; z-index: 1000; width: 32px; height: 32px; border-radius: 6px; font-size: 16px; display: flex; align-items: center; justify-content: center; background: rgba(0,0,0,0.5);"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:16px;height:16px;"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg></button>

  <div class="canvas-body">


    <!-- Toolbar (Controls shown for all users, but some hidden based on role) -->
    <div class="canvas-toolbar" id="canvas-toolbar">
      <!-- Title & Zoom Controls -->
      <div class="canvas-title" style="margin-right: 16px; border-right: 1px solid var(--canvas-node-border); padding-right: 16px;">
        <svg class="si" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="margin-right: 6px;">
          <rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect>
          <line x1="3" y1="9" x2="21" y2="9"></line>
          <line x1="9" y1="21" x2="9" y2="9"></line>
        </svg>
        Concept Canvas
      </div>
      <button class="canvas-tool-btn" id="canvas-theme-toggle" title="Toggle Theme (Dark/Light)"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path></svg></button>
      <button class="canvas-tool-btn" id="canvas-zoom-out" title="Zoom Out">−</button>
      <span class="canvas-zoom-level" id="canvas-zoom-level" style="user-select:none; margin: 0 8px; font-size: 12px; font-weight: bold; width: 40px; text-align: center;">100%</span>
      <button class="canvas-tool-btn" id="canvas-zoom-in" title="Zoom In">+</button>
      <button class="canvas-tool-btn" id="canvas-fit" title="Fit to Screen"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M8 3H5a2 2 0 0 0-2 2v3m18 0V5a2 2 0 0 0-2-2h-3m0 18h3a2 2 0 0 0 2-2v-3M3 16v3a2 2 0 0 0 2 2h3"></path></svg></button>
      <div class="canvas-toolbar-separator canvas-owner-only"></div>
      <button class="canvas-tool-btn canvas-owner-only" data-tool="select" title="Select / Pan (V)" aria-pressed="true">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 3l7.07 16.97 2.51-7.39 7.39-2.51L3 3z"></path><path d="M13 13l6 6"></path></svg>
      </button>
      <div class="canvas-toolbar-separator canvas-owner-only"></div>
      <input type="file" id="canvas-upload-image" accept="image/*" hidden>
      <button class="canvas-tool-btn canvas-danger canvas-owner-only" id="canvas-delete-selected" title="Delete Selected (Del)" disabled>
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg>
      </button>
      <div class="canvas-toolbar-spacer"></div>
      <span class="canvas-saving-indicator canvas-owner-only" id="canvas-saving-indicator" hidden style="margin-right: 16px;">Saving...</span>
      <button class="canvas-tool-btn canvas-save-btn canvas-owner-only" id="canvas-save-btn" title="Save Changes (Ctrl+S)" style="margin-right: 8px;">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"></path><polyline points="17 21 17 13 7 13 7 21"></polyline><polyline points="7 3 7 8 15 8"></polyline></svg>
        Save
      </button>
      <button class="canvas-tool-btn canvas-danger" id="canvas-close" title="Close Canvas"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg></button>
    </div>

    <div class="canvas-workspace">
      <!-- Floating Node Toolbar (Obsidian style) -->
      <div class="canvas-node-toolbar" id="canvas-node-toolbar" hidden>
        <button class="node-toolbar-btn canvas-owner-only" id="nt-delete" title="Delete">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg>
        </button>
        <div class="node-toolbar-sep canvas-owner-only"></div>
        <button class="node-toolbar-btn canvas-owner-only" id="nt-color" title="Color">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2.69l5.66 5.66a8 8 0 1 1-11.31 0z"></path></svg>
        </button>
        <div class="node-toolbar-sep canvas-owner-only"></div>
        <button class="node-toolbar-btn" id="nt-zoom" title="Zoom to fit">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 3 21 3 21 9"></polyline><polyline points="9 21 3 21 3 15"></polyline><line x1="21" y1="3" x2="14" y2="10"></line><line x1="3" y1="21" x2="10" y2="14"></line></svg>
        </button>
        <button class="node-toolbar-btn canvas-owner-only" id="nt-edit" title="Edit">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path></svg>
        </button>
        <button class="node-toolbar-btn canvas-owner-only" id="nt-image" title="Import image">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><circle cx="8.5" cy="8.5" r="1.5"></circle><polyline points="21 15 16 10 5 21"></polyline></svg>
        </button>
        <button class="node-toolbar-btn" id="nt-link" title="Share node link in chat">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"></path><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"></path></svg>
        </button>
        <button class="node-toolbar-btn canvas-owner-only" id="nt-disconnect" title="Remove all connections">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M10 13a5 5 0 0 1-7.54.54l-1.46-1.46"></path><path d="M14 11a5 5 0 0 1 7.54-.54l1.46 1.46"></path><line x1="3" y1="21" x2="21" y2="3"></line></svg>
        </button>

        <!-- Color Palette Dropdown -->
        <div class="node-color-palette canvas-owner-only" id="node-color-palette" hidden>
          <div class="color-swatch" style="background:transparent; border:1px solid #777;" data-color="default"></div>
          <div class="color-swatch" style="background:#ff5252;" data-color="1"></div>
          <div class="color-swatch" style="background:#ff9800;" data-color="2"></div>
          <div class="color-swatch" style="background:#ffd600;" data-color="3"></div>
          <div class="color-swatch" style="background:#4caf50;" data-color="4"></div>
          <div class="color-swatch" style="background:#00bcd4;" data-color="5"></div>
          <div class="color-swatch" style="background:#ba68c8;" data-color="6"></div>
        </div>

        <!-- Format Context Menu Dropdown -->
        <div class="node-format-menu canvas-owner-only" id="node-format-menu" hidden>
          <div class="format-item" data-format="ul"><svg class="si" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="8" y1="6" x2="21" y2="6"></line><line x1="8" y1="12" x2="21" y2="12"></line><line x1="8" y1="18" x2="21" y2="18"></line><line x1="3" y1="6" x2="3.01" y2="6"></line><line x1="3" y1="12" x2="3.01" y2="12"></line><line x1="3" y1="18" x2="3.01" y2="18"></line></svg> Bullet list</div>
          <div class="format-item" data-format="ol"><svg class="si" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="10" y1="6" x2="21" y2="6"></line><line x1="10" y1="12" x2="21" y2="12"></line><line x1="10" y1="18" x2="21" y2="18"></line><path d="M4 6h1v4"></path><path d="M4 10h2"></path><path d="M6 18H4c0-1 2-2 2-3s-1-1.5-2-1"></path></svg> Numbered list</div>
          <div class="format-item" data-format="task"><svg class="si" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 11 12 14 22 4"></polyline><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"></path></svg> Task list</div>
          <div class="format-sep"></div>
          <div class="format-item" data-format="h1"><span style="font-weight:bold; font-family:serif;">H1</span> Heading 1</div>
          <div class="format-item" data-format="h2"><span style="font-weight:bold; font-family:serif;">H2</span> Heading 2</div>
          <div class="format-item" data-format="h3"><span style="font-weight:bold; font-family:serif;">H3</span> Heading 3</div>
          <div class="format-sep"></div>
          <div class="format-item" data-format="bold"><svg class="si" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 4h8a4 4 0 0 1 4 4 4 4 0 0 1-4 4H6z"></path><path d="M6 12h9a4 4 0 0 1 4 4 4 4 0 0 1-4 4H6z"></path></svg> Bold</div>
          <div class="format-item" data-format="italic"><svg class="si" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="19" y1="4" x2="10" y2="4"></line><line x1="14" y1="20" x2="5" y2="20"></line><line x1="15" y1="4" x2="9" y2="20"></line></svg> Italic</div>
          <div class="format-item" data-format="quote"><svg class="si" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M10 11h-4a1 1 0 0 1-1-1V6a1 1 0 0 1 1-1h3a1 1 0 0 1 1 1v6c0 2.5-2 4.5-4 4.5"></path><path d="M19 11h-4a1 1 0 0 1-1-1V6a1 1 0 0 1 1-1h3a1 1 0 0 1 1 1v6c0 2.5-2 4.5-4 4.5"></path></svg> Quote</div>
          <div class="format-item" data-format="code"><svg class="si" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="16 18 22 12 16 6"></polyline><polyline points="8 6 2 12 8 18"></polyline></svg> Code</div>
          <div class="format-sep"></div>
          <div class="format-item" data-format="link"><svg class="si" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"></path><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"></path></svg> Insert URL</div>
          <div class="format-sep"></div>
          <div class="format-item" data-format="clear"><svg class="si" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg> Clear formatting</div>
        </div>
      </div>

      <!-- Main Infinite Canvas -->
      <div class="canvas-viewport" id="canvas-viewport" tabindex="0">
        <div class="canvas-selection-box" id="canvas-selection-box" hidden></div>
        <div class="canvas-content" id="canvas-content">
          <!-- Nodes and SVG edges go here -->
          <svg class="canvas-edges" id="canvas-edges">
          </svg>
          <div class="canvas-nodes" id="canvas-nodes"></div>

          <!-- Edge drawing preview -->
          <svg class="canvas-drawing-layer" id="canvas-drawing-layer">
            <path id="canvas-drawing-edge" d="" fill="none" stroke="var(--canvas-edge-color)" stroke-width="2" stroke-dasharray="4"></path>
            <polygon id="canvas-drawing-arrow" points="" fill="#777" class="canvas-drawing-arrow"></polygon>
          </svg>

          <!-- Snap alignment guides -->
          <svg class="canvas-guides-layer" id="canvas-guides-layer"></svg>
        </div>
      </div>

      <!-- Minimap -->
      <div class="canvas-minimap" id="canvas-minimap">
        <canvas id="canvas-minimap-canvas" width="180" height="120"></canvas>
        <div class="canvas-minimap-viewport" id="canvas-minimap-viewport"></div>
      </div>

      <!-- Search Bar -->
      <div class="canvas-search-bar" id="canvas-search-bar" hidden>
        <svg class="si" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:14px;height:14px;opacity:0.5;flex-shrink:0;"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
        <input id="canvas-search-input" placeholder="Search nodes..." autocomplete="off">
        <span id="canvas-search-count" class="canvas-search-count"></span>
        <button class="canvas-search-btn" id="canvas-search-prev" title="Previous (Shift+Enter)"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:12px;height:12px;"><polyline points="18 15 12 9 6 15"></polyline></svg></button>
        <button class="canvas-search-btn" id="canvas-search-next" title="Next (Enter)"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:12px;height:12px;"><polyline points="6 9 12 15 18 9"></polyline></svg></button>
        <button class="canvas-search-btn" id="canvas-search-close" title="Close (Esc)"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:12px;height:12px;"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg></button>
      </div>

      <!-- Chat reopen tab (visible when sidebar collapsed) -->
      <button class="canvas-chat-reopen" id="canvas-chat-reopen" hidden title="Open discussion"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:16px;height:16px;"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path></svg></button>

      <!-- Integrated Discussion Chat -->
      <div class="canvas-chat-sidebar" id="canvas-chat-sidebar">
        <div class="canvas-chat-header">
          <h3>Discussion</h3>
          <button class="canvas-chat-collapse-btn" id="canvas-chat-toggle" title="Collapse chat"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:12px;height:12px;"><polyline points="15 18 9 12 15 6"></polyline></svg></button>
        </div>
        <div id="canvas-discussion-messages" class="canvas-discussion-messages">
          <div class="canvas-discussion-loading">Loading chat...</div>
        </div>
        <div class="canvas-discussion-input-wrap">
          <textarea id="canvas-discussion-input" class="canvas-discussion-input" rows="2" placeholder="Join discussion..."></textarea>
          <button id="canvas-discussion-send" class="canvas-discussion-send" title="Send"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:16px;height:16px;"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg></button>
        </div>
      </div>
    </div>
  </div>

  <!-- Loading / Error Overlay -->
  <div class="canvas-overlay" id="canvas-overlay">
    <div class="canvas-overlay-content" id="canvas-overlay-text">Loading Canvas...</div>
  </div>

  <!-- Canvas Background Context Menu -->
  <div id="canvas-context-menu" class="ui-context-menu" hidden style="position:absolute;z-index:9999;">
    <ul>
      <li id="cm-add-text">Add Text Node</li>
      <li id="cm-add-img">Add Image Node</li>
      <li id="cm-add-group">Add Group</li>
    </ul>
  </div>
</div>
